{% extends "base.html" %}
{% block title %}Editar Cita{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <h3 class="mb-0">Editar Cita</h3>
    <div class="text-muted">
      Cliente: {{ cita.mascota.cliente.nombre }} ({{ cita.mascota.cliente.rut }})<br>
      Mascota: {{ cita.mascota.nombre }}
    </div>
  </div>
  <a class="btn btn-outline-secondary" href="{% url 'citas_pendientes_filtrado' %}">Volver</a>
</div>

<form method="post" class="card shadow-sm">
  {% csrf_token %}
  <div class="card-body">
    {{ form.as_p }}
  </div>
  <div class="card-footer bg-white d-flex justify-content-end gap-2">
    <a class="btn btn-outline-secondary" href="{% url 'citas_pendientes_filtrado' %}">Cancelar</a>
    <button class="btn btn-primary" type="submit">Guardar</button>
  </div>
</form>
{% endblock %}
