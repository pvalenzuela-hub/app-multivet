{% extends "base.html" %}
{% block title %}Ver Promocion{% endblock %}
{% block content %}
<div class="container py-3">
  <h3>{{ promocion.titulo }}</h3>
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="text-muted small">Fecha creacion</div>
      <div class="mb-3">{{ promocion.fecha_creacion|date:"d-m-Y H:i" }}</div>
      <div class="text-muted small">Descripcion</div>
      <div class="mb-3">{{ promocion.descripcion|default:"-" }}</div>
      <div class="text-muted small">Texto del correo</div>
      <pre class="bg-light border rounded p-3 mb-0">{{ promocion.texto_correo }}</pre>
    </div>
  </div>
</div>
{% endblock %}
